# IncidentIQ - nginx reverse proxy in front of the FastAPI backend.
#
# Listens on 80 for HTTP (will be 301-redirected to 443 by certbot once
# SSL is provisioned). Listens on 443 for HTTPS once certbot adds the
# ssl_certificate directives - this template intentionally only declares
# the :80 server because certbot --nginx generates the :443 block from it.
#
# All paths under api.nexusagent.in are proxied to uvicorn on
# 127.0.0.1:8000. Long-polling and SSE need proxy_buffering off plus a
# generous read timeout so /analyze/stream stays open while the agent
# thinks for ~30s.

server {
    listen 80;
    listen [::]:80;
    server_name api.nexusagent.in;

    # Allow ACME http-01 challenge before SSL is in place.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Everything else -> uvicorn.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / streaming endpoints (/api/v1/analyze/stream): disable
        # response buffering so events ship to the browser immediately,
        # and bump read timeouts so a 30s Bedrock call doesn't drop the
        # connection.
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      300s;
        proxy_send_timeout      300s;
        proxy_connect_timeout   60s;

        # Don't redirect upstream's 302s (e.g. the GitHub OAuth dance).
        proxy_redirect off;
    }

    # Tiny health probe path the CI/CD pipeline pings after a deploy.
    location = /__nginx_ok {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
