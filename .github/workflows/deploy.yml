name: Deploy backend to EC2

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "deploy/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

# Don't run two deploys in parallel; the second one would race with the
# first on the systemd restart and could leave the service in a bad
# state. cancel-in-progress lets a newer push supersede a stale one.
concurrency:
  group: deploy-ec2-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to api.nexusagent.in
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Sanity: fail fast if the deploy secrets aren't configured rather
      # than letting the SSH step explode with a confusing message.
      - name: Check required secrets
        run: |
          missing=()
          [[ -z "${{ secrets.EC2_HOST }}" ]] && missing+=("EC2_HOST")
          [[ -z "${{ secrets.EC2_USER }}" ]] && missing+=("EC2_USER")
          [[ -z "${{ secrets.EC2_SSH_KEY }}" ]] && missing+=("EC2_SSH_KEY")
          if (( ${#missing[@]} > 0 )); then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo "Add them at: Settings -> Secrets and variables -> Actions"
            exit 1
          fi
          echo "All deploy secrets present."

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          timeout: 60s
          command_timeout: 5m
          script_stop: true
          script: |
            set -euo pipefail

            echo ">> Pulling latest main..."
            cd /opt/incidentiq
            git fetch --depth=1 origin main
            git reset --hard origin/main

            echo ">> Installing/updating Python deps..."
            cd /opt/incidentiq/backend
            ./.venv/bin/pip install --upgrade pip wheel --quiet
            ./.venv/bin/pip install -r requirements.txt --quiet

            # IMPORTANT: do NOT overwrite the nginx config on every deploy.
            # certbot edited the file in-place during initial setup to add
            # the :443 SSL server block; the version in the repo only has
            # the :80 listener. Overwriting blanks out SSL until certbot
            # is re-run. If you genuinely need to change nginx, edit it on
            # the box and snapshot the result back to the repo, then update
            # this step on purpose.
            echo ">> Refreshing systemd unit (idempotent)..."
            sudo cp /opt/incidentiq/deploy/systemd/incidentiq.service /etc/systemd/system/incidentiq.service
            sudo systemctl daemon-reload

            echo ">> Restarting backend..."
            sudo systemctl restart incidentiq

            echo ">> Health check..."
            # systemd reports "active" the moment the process forks; give
            # uvicorn ~5s to actually bind the port before we curl it.
            for attempt in 1 2 3 4 5; do
              sleep 2
              if curl -fsS --max-time 5 http://127.0.0.1:8000/health > /dev/null; then
                echo "OK after $((attempt * 2))s"
                exit 0
              fi
              echo "  attempt $attempt: backend not ready yet"
            done
            echo "::error::Backend did not become healthy within 10s"
            sudo journalctl -u incidentiq -n 50 --no-pager
            exit 1

      - name: Smoke test public URL
        if: success()
        run: |
          # Hit the public HTTPS endpoint to confirm nginx + SSL + the
          # backend are all aligned. Tolerates a 1-2s window where
          # nginx is still reloading.
          for attempt in 1 2 3 4 5; do
            sleep 2
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 https://api.nexusagent.in/health || echo "000")
            if [[ "$code" == "200" ]]; then
              echo "Public health check passed (HTTP $code)"
              exit 0
            fi
            echo "  attempt $attempt: HTTP $code"
          done
          echo "::warning::Public health check did not return 200 - check nginx / SSL / DNS"
